<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4</title>
</head>
<body>
    <h2>While</h2>
    <p id="while"></p>

    <h2>For</h2>
    <p id="for"></p>

    <h2>Tabuada</h2>
    <p id="tab"></p>
    
</body>

<script>
    //Laço While
    let contador = 1;
    let text = "";

    while(contador <= 5){
        //alert("Volta "+contador);
        text = text + "O número é: "+contador+"<br>"
        contador++;
    }
    document.getElementById("while").innerHTML = text;

    //Laço FOR
    let texto = "";

    for(let cont=1; cont<=10; cont++){
        texto = texto + "O número é: "+cont+"<br>"
    }

    document.getElementById("for").innerHTML = texto;


//Tabuada 5
let res = "";
for(let cont=0; cont<=10; cont++){
    res = res + "5 x "+cont+" = "+5*cont+"<br>"
}
document.getElementById("tab").innerHTML = res;

</script>
</html>
